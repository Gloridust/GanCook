services:
  gancook:
    # 默认用 Docker Hub 镜像（国内飞牛等 NAS 有加速）。升级只需 docker compose pull && up -d
    image: gloridust/gancook:latest
    # 海外/或偏好 GHCR：ghcr.io/gloridust/gancook:latest
    # 本地自行构建：注释 image 一行，取消下一行注释
    # build: .
    container_name: gancook
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      # 唯一需要关心的东西：数据目录（SQLite + 上传图片）。备份只需复制 ./data
      - ./data:/data
      # 可选：启用「网页端一键更新」。挂载 Docker 套接字后，管理员可在
      # 「家庭管理 → 关于与更新」里点按钮自动拉新镜像并重建容器。
      # 需要访问套接字的权限，最简单是配合下面的 user: root（注意这会以 root 运行）。
      # - /var/run/docker.sock:/var/run/docker.sock
    # user: root            # 仅当启用上面的套接字挂载、需要一键更新时取消注释
    environment:
      # 全部可选。开箱即用，无需配置任何密钥（首次启动自动生成并持久化到 ./data）。
      TZ: Asia/Shanghai
